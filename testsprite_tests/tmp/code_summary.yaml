version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Next.js
  - Supabase
  - Lucide React
  - Framer Motion
routes:
  - path: /
    file: src/app/page.tsx
    auth_required: false
    description: Public landing page
  - path: /login
    file: src/app/login/page.tsx
    auth_required: false
    description: User login page
  - path: /signup
    file: src/app/signup/page.tsx
    auth_required: false
    description: User registration page
  - path: /dashboard
    file: src/app/dashboard/page.tsx
    auth_required: true
    description: Teacher dashboard main view
  - path: /dashboard/create
    file: src/app/dashboard/create/page.tsx
    auth_required: true
    description: Page to create new homework assignments
  - path: /dashboard/results
    file: src/app/dashboard/results/page.tsx
    auth_required: true
    description: View student performance and results
  - path: /dashboard/settings
    file: src/app/dashboard/settings/page.tsx
    auth_required: true
    description: User and account settings
  - path: /hw/[id]
    file: src/app/hw/[id]/page.tsx
    auth_required: false
    description: Student interface for joining and taking a homework
features:
  - name: User Authentication
    description: Sign up and login with email and password
    files:
      - src/app/login/page.tsx
      - src/app/signup/page.tsx
    entry_route: /login
    user_interactions:
      - Fill email and password
      - Click Login/Signup button
    auth_required: false
  - name: Create Homework
    description: Teachers create customized homework assignments
    files:
      - src/app/dashboard/create/page.tsx
    entry_route: /dashboard/create
    user_interactions:
      - Click "Add Question"
      - Select question type (MCQ, True/False, Essay)
      - Enter question text and options
      - "Save" or "Publish"
    auth_required: true
  - name: Student Assignment Session
    description: Students join a homework via ID and submit answers
    files:
      - src/app/hw/[id]/page.tsx
    entry_route: /hw/123
    user_interactions:
      - Enter student name
      - Answer questions (select options or type text)
      - Submit responses
    auth_required: false
known_limitations: []
